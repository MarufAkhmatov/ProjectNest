# ProjectNest — containerized deployment of the live app
# (stdlib Python backend + built Vite frontend served by nginx).
#
#   docker compose up -d --build
#   docker compose logs -f
#   docker compose down
#
# Open  http://localhost:8080  (change the host port with PN_WEB_PORT).
# NOTE: stop the local (non-Docker) server first if it already holds :8080,
# or run with  PN_WEB_PORT=8090 docker compose up -d --build
# Uploaded datasets persist in ./storage (shared with the non-Docker backend).
name: projectnest

services:
  backend:
    container_name: projectnest-backend
    image: projectnest-backend
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    volumes:
      # Same host folders the local backend uses → both deployments stay in sync.
      - ./storage:/app/storage
      - ./knowledge_base:/app/knowledge_base:ro
      - ./ai/vector_db:/app/ai/vector_db
    environment:
      # Temur AI inside the container reaches the HOST's Ollama; an Anthropic
      # key is an optional cloud fallback (host Claude CLI is absent here).
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-3-5-haiku-latest}
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux parity for the host alias
    restart: unless-stopped

  web:
    container_name: projectnest-web
    image: projectnest-web
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - "${PN_WEB_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped
